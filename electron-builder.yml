appId: ac.thaimooc.olxbuilder
productName: OLX Course Builder
copyright: © 2026 ThaiMOOC

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**
  - package.json

# Bundle Next standalone via afterPack hook (handles node_modules correctly,
# which electron-builder's extraResources tends to strip).
afterPack: electron/afterPack.js

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.education
  # icon: build/icon.icns  # add later
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  sign: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  shortcutName: OLX Course Builder

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Education
  # icon: build/icon.png  # add later
